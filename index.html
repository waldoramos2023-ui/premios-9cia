function parseCSV(text){

  const [sel,setSel]=React.useState(null);

  const cargarDatos = React.useCallback(()=>{

    fetch(CSV_URL + "&t=" + Date.now())
      .then(r=>{if(!r.ok)throw new Error("Error " + r.status);return r.text();})
      .then(text=>{
        const datos = parseCSV(text);
        if(datos.length === 0) throw new Error("No se encontraron datos");
        setVoluntarios(datos);
        setUltActualizacion(new Date());

      })
      .catch(err=>{setError(err.message);setCargando(false);});
  },[]);

  React.useEffect(()=>{cargarDatos();},[cargarDatos]);

  const resumen=React.useMemo(()=>{const c={total:voluntarios.length,vencido:0,proximo:0,semestre:0,sin:0};voluntarios.forEach(v=>{const k=estadoProximo(v.proximo_premio).key;if(c[k]!==undefined)c[k]++;});return c;},[voluntarios]);
  const filtrados=React.useMemo(()=>{let arr=voluntarios.filter(v=>v.nombre.toLowerCase().includes(busqueda.toLowerCase()));if(filtro!=="todos")arr=arr.filter(v=>estadoProximo(v.proximo_premio).key===filtro);return [...arr].sort((a,b)=>{if(orden==="proximo"){const da=parseDate(a.proximo_premio)||new Date("9999-01-01");const db=parseDate(b.proximo_premio)||new Date("9999-01-01");return da-db;}if(orden==="nombre")return a.nombre.localeCompare(b.nombre);return a.id-b.id;});},[voluntarios,busqueda,filtro,orden]);
  const FILTROS=[{key:"todos",label:`Todos (${resumen.total})`,color:"#555"},{key:"vencido",label:`Vencidos (${resumen.vencido})`,color:"#c0392b"},{key:"proximo",label:`Próximos 60d (${resumen.proximo})`,color:"#e67e22"},{key:"semestre",label:`6 meses (${resumen.semestre})`,color:"#2980b9"},{key:"sin",label:`Sin fecha (${resumen.sin})`,color:"#8b8b8b"}];

              React.createElement("div",{key:label,style:{background:bg,borderRadius:10,padding:"10px",textAlign:"center"}},React.createElement("div",{style:{fontSize:26,fontWeight:500,color}},val),React.createElement("div",{style:{fontSize:11,color:"#777",marginTop:1}},label)))),
